name: Release Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    name: Build Windows Installer and Updater Artifacts
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    env:
      CI: "true"
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build bundled sidecars
        run: |
          python scripts/build_sidecars.py
          python scripts/prepare_binaries.py

      - name: Verify bundled binaries exist
        run: |
          Test-Path frontend/src-tauri/binaries/k24-backend-x86_64-pc-windows-msvc.exe
          Test-Path frontend/src-tauri/binaries/k24-listener-x86_64-pc-windows-msvc.exe

      - name: Build installers, sign updater bundles, and publish release assets
        uses: tauri-apps/tauri-action@v0.5.23
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: K24 ${{ github.ref_name }}
          releaseBody: |
            Desktop release for K24.

            This release includes the signed installer bundles and Tauri updater artifacts required for installed-user auto-updates.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
